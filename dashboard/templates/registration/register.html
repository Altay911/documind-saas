<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | DocuMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Basic input styling */
        input {
            width: 100%;
            padding: 0.375rem 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
        }
        
        /* The magic to glue the button to the right side of the input */
        .input-group {
            display: flex;
            flex-wrap: nowrap; /* Forces them on the exact same line */
            margin-bottom: 1rem;
        }
        
        .input-group input {
            flex: 1 1 auto; /* Tells the input to shrink slightly to fit the button */
            margin-bottom: 0;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        
        ul.errorlist { color: red; list-style: none; padding: 0; font-size: 0.9em; }
        .helptext { font-size: 0.8em; color: #6c757d; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm mt-5">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 text-primary fw-bold">Create an Account</h3>
                        
                        <form method="POST">
                            {% csrf_token %}
                            
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">{{ field.label }}</label>
                                    
                                    {% if 'password' in field.name %}
                                        <div class="input-group">
                                            {{ field }}
                                            <button class="btn btn-outline-secondary toggle-password" type="button">
                                                <i class="bi bi-eye-slash"></i>
                                            </button>
                                        </div>
                                    {% else %}
                                        {{ field }}
                                    {% endif %}
                                    
                                    <div class="text-danger">{{ field.errors }}</div>
                                    {% if field.help_text %}
                                        <div class="helptext">{{ field.help_text }}</div>
                                    {% endif %}
                                </div>
                            {% endfor %}
                            
                            <button type="submit" class="btn btn-primary w-100 rounded-pill mt-3">Sign Up</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}">Already have an account? Log in here.</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const toggleButtons = document.querySelectorAll('.toggle-password');
        
        toggleButtons.forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
