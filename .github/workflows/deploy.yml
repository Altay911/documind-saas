name: Deploy DocuMind to EC2

# 1. THE TRIGGER: This tells GitHub to run this script ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main  # If your branch is named 'master', change this to master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 2. THE ACTION: This logs into your server using the secrets we just saved
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          
          # 3. THE SCRIPT: These are the exact commands you typed manually!
          script: |
            cd DocuMind
            git pull origin main
            docker compose up -d --build
            docker compose exec -T web python manage.py migrate